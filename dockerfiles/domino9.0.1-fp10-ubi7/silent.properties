# Domino 9.0.1 (and FP10) silent install response file.
#
# Format: InstallShield Options File (NOT java properties).
#   -G <global>=<value>             license, etc.
#   -W <Panel>.<setting>=<value>    wizard panel settings
#   -P <feature>.active=<bool>      feature on/off
#
# Use: ./install -options silent.properties -silent  (must run as root)
#
# Derived from base installer's unix_response.dat template:
#   linux64/domino/unix_response.dat inside DOMINO_9.0.1_64_BIT_LIN_XS_EN.tar
#
# Decisions (see openspec/changes/.../design.md):
#   - D3 silent install (no TTY, no X11)
#   - Install Enterprise Server (full functionality, internal Dev/Test)
#   - Manual server setup (don't auto-launch; entrypoint handles first-run)
#   - Single non-partitioned data dir
#   - User/group: notes (uid/gid managed in Dockerfile via useradd)

# Accept license
-G licenseAccepted=true

# Not data-only — full program + data install
-W InstallDataOnlyOptionPanel.InstallDataOnly=false

# Program install location (Domino 9 IBM-era path)
-P installLocation="/opt/ibm/domino"

# Data location (non-partitioned)
-W normalData.installLocationData="/local/notesdata"

# Unix user / group that will own data
-W NameUserGroupPanel.UserName="notes"
-W NameUserGroupPanel.GroupName="notes"

# Not partitioned
-W programFiles.isPartitioned=false

# Server type: EnterpriseServer = messaging + application services
-W SetupTypePanel.selectedSetupTypeId=EnterpriseServer

# Create the /opt/ibm/domino soft link (default true)
-W InstallOptionPanel.CreateOptIbmDomino=true

# Don't auto-launch server setup at install end — entrypoint.sh handles first-run setup
-W ServerSetupPanel.ServerSetupType="Manual"

# Features (mirror Enterprise default set)
-P LicenseFeature.active=true
-P ProgramFilesFeature.active=true
-P BillingSupportFeature.active=true
-P ClusteringSupportFeature.active=true
-P bean2236.active=true
-P DataFilesFeature.active=true
-P beanRequiredTemplates.active=true
